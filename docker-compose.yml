services:
  # All-in-one monitoring container: Prometheus, Grafana, exporters
  spark-monitor:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: spark-monitor
    ports:
      - "9090:9090"    # Prometheus
      - "3000:3000"    # Grafana
      - "9100:9100"    # node_exporter
      - "9400:9400"    # gpu_exporter (DCGM)
      - "8001:8001"    # vllm_exporter
      - "9106:9106"    # system_exporter
      - "9107:9107"    # agent_exporter
    volumes:
      # Host system metrics (node_exporter)
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro

      # Agent stats files (agent_exporter)
      - ${HOME}/.claude:/host/.claude:ro
      - ${HOME}/.codex:/host/.codex:ro
      - ${HOME}/.opencode:/host/.opencode:ro

      # Persistent state (vllm_exporter, system_exporter)
      - spark-monitor-data:/root/.config/spark-monitor

      # Prometheus data
      - prometheus_data:/var/lib/prometheus

      # Grafana data
      - grafana_data:/var/lib/grafana

      # Configuration files (mountable from host for customization)
      - ./prometheus.yml:/etc/spark-monitor/prometheus.yml:ro
      - ./prometheus/alert_rules.yml:/etc/spark-monitor/prometheus/alert_rules.yml:ro
      - ./custom-dcgm-counters.csv:/etc/spark-monitor/custom-dcgm-counters.csv:ro
      - ./grafana/provisioning:/etc/spark-monitor/grafana/provisioning:ro
      - ./grafana/dashboards:/etc/spark-monitor/grafana/dashboards:ro
    environment:
      # Grafana credentials
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false

      # vLLM exporter
      - VLLM_URL=http://host.docker.internal:8000

      # Agent exporter paths (inside container)
      - CLAUDE_STATS_PATH=/host/.claude/stats-cache.json
      - CODEX_DB_PATH=/host/.codex/state_5.sqlite
      - OPENCODE_STATS_PATH=/host/.opencode/stats-cache.json
      - OPENCODE_DB_PATH=/host/.opencode/state_5.sqlite
    pid: "host"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

volumes:
  prometheus_data:
  grafana_data:
  spark-monitor-data:
