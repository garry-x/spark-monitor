services:
  # System metrics collector
  node_exporter:
    image: docker.m.daocloud.io/prom/node-exporter:latest
    container_name: node_exporter
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.ignored-mount-points=^/(dev|proc|sys|var/lib/docker/.+|var/lib/containers/.+)[:]'
      - '--collector.filesystem.ignored-fs-types=^(autofs|binfmt_misc|bpf|cgroup2?|configfs|debugfs|devpts|devtmpfs|fusectl|hugetlbfs|iso9660|mqueue|nsfs|overlay|proc|procfs|pstore|rpc_pipefs|securityfs|selinuxfs|squashfs|sysfs|tmpfs)'

  # vLLM metrics exporter with persistence
  vllm_exporter:
    build:
      context: .
      dockerfile: Dockerfile.vllm_exporter
    container_name: vllm_exporter
    ports:
      - "8001:8001"
    volumes:
      - vllm_exporter_data:/root/.config/spark-monitor
    environment:
      - VLLM_URL=http://host.docker.internal:8000
      - EXPORTER_PORT=8001
      - SCRAPE_INTERVAL=5
    working_dir: /app
    command: python exporters/vllm_exporter.py
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  # GPU metrics collector - NVIDIA DCGM Exporter
  gpu_exporter:
    image: nvidia/dcgm-exporter:4.5.2-4.8.1-distroless
    container_name: gpu_exporter
    ports:
      - "9400:9400"
    environment:
      - DCGM_EXPORTER_LISTEN_ADDRESS=0.0.0.0:9400
      - DCGM_EXPORTER_UPDATE_FREQUENCY=1
      - DCGM_EXPORTER_EXPORT_DEFAULT_METRICS=true
    volumes:
      - ./custom-dcgm-counters.csv:/etc/dcgm-exporter/default-counters.csv:ro

  # System metrics exporter (GPU process memory, etc.)
  system_exporter:
    build:
      context: .
      dockerfile: Dockerfile.system_exporter
    container_name: system_exporter
    pid: "host"
    ports:
      - "9106:9106"
    environment:
      - EXPORTER_PORT=9106
      - SCRAPE_INTERVAL=15
    command: python exporters/system_exporter.py
    volumes:
      - system_exporter_data:/root/.config/spark-monitor
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped

  # Agent token usage exporter (Claude Code + Codex)
  agent_exporter:
    build:
      context: .
      dockerfile: Dockerfile.agent_exporter
    container_name: agent_exporter
    ports:
      - "9107:9107"
    volumes:
      - ${HOME}/.claude/stats-cache.json:/root/.claude/stats-cache.json:ro
      - ${HOME}/.codex/state_5.sqlite:/root/.codex/state_5.sqlite:ro
    environment:
      - EXPORTER_PORT=9107
      - SCRAPE_INTERVAL=60
      - CLAUDE_STATS_PATH=/root/.claude/stats-cache.json
      - CODEX_DB_PATH=/root/.codex/state_5.sqlite
    command: python exporters/agent_exporter.py
    restart: unless-stopped

  # Prometheus server
  prometheus:
    image: docker.m.daocloud.io/prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'

  # Grafana
  grafana:
    image: docker.m.daocloud.io/grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/dashboards:/var/lib/grafana/dashboards
      - ./grafana/provisioning:/etc/grafana/provisioning
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false

  

volumes:
  prometheus_data:
  grafana_data:
  vllm_exporter_data:
  system_exporter_data: