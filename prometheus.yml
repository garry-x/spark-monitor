global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'node_exporter'
    static_configs:
      - targets: ['node_exporter:9100']

  - job_name: 'gpu_exporter'
    static_configs:
      - targets: ['gpu_exporter:9400']

  - job_name: 'opencode-exporter'
    static_configs:
      - targets: ['opencode-exporter:9105']

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']