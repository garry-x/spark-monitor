global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'node_exporter'
    static_configs:
      - targets: ['node_exporter:9100']

  - job_name: 'gpu_exporter'
    static_configs:
      - targets: ['gpu_exporter:9400']

  # vLLM metrics
  - job_name: 'vllm'
    static_configs:
      - targets: ['host.docker.internal:8000']  # Access host machine's localhost
    metrics_path: /metrics
    scheme: http

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']