global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'node_exporter'
    static_configs:
      - targets: ['node_exporter:9100']

  - job_name: 'gpu_exporter'
    static_configs:
      - targets: ['gpu_exporter:9400']

  # vLLM metrics (direct from vLLM for scheduler state)
  - job_name: 'vllm'
    static_configs:
      - targets: ['host.docker.internal:8000']
    metrics_path: /metrics
    scheme: http

  # vLLM exporter with persistent counters
  - job_name: 'vllm_exporter'
    static_configs:
      - targets: ['vllm_exporter:8001']
    scheme: http

  - job_name: 'system_exporter'
    static_configs:
      - targets: ['system_exporter:9106']

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']